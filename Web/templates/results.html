<!DOCTYPE html>
{% extends "layout.html" %} {% block content %}
<h1 class="display-5" style="margin-top: 10px">Recomendaciones</h1>
<table role="table" class="table-results">
  <thead role="rowgroup">
    <tr role="row">
      <th role="columnheader">Fecha</th>
      <th role="columnheader">Fototipo</th>
      <th role="columnheader">Condición del cielo</th>
      <th role="columnheader">Hora inicial del TES</th>
      <th role="columnheader">Hora final del TES</th>
      <th role="columnheader">Hora límite para evitar quemadura solar</th>
    </tr>
  </thead>
  <tbody role="rowgroup">
    <tr role="row">
      <td role="cell">{{info[2]}}</td>
      <td role="cell">{{info[4]}}</td>
      <td role="cell">{{info[5]}}</td>
      <td role="cell">{{info[3]}}</td>
      <td role="cell">{{info[0]}}</td>
      <td role="cell">{{info[1]}}</td>
    </tr>
  </tbody>
</table>
<br />
<a class="btn btn-primary" href="{{url_for('calc')}}"
  ><i class="fa fa-home"></i><strong> Inicio</strong></a
>
{% endblock%}
