# Projects section
projects:
  item11: 
    title: Instalación sugerida para los sensores Skye UVA, UVB y UVI
    description: Se presento un informe para el SIMA de Nuevo León, México. En este informe se realiza una sugerencia acerca de donde se sugiere la localización óptima para la instalación de los sensores Skye, esto bajo estudios dermatológicos y atmosféricos.
    link: https://github.com/giovannilopez9808/Documents/raw/master/Informes/Informe_radsolar_29Mar21.pdf
    github:
    img: informe_sima.png
  item10:
    title: TES para tu salud
    description: Plataforma creada para ofrecer el tiempo de exposición solar (TES) para el tratamiento de psoriasis a los pacientes del Centro Dermatologico de Pascua, Ciudad de México, actualmente esta uso y los pacientes han mostrado mejorias en su situación.
    link: http://tes-v1.herokuapp.com/
    github:
    img: tes_webpage.png
  item9:
    title: Comparación de tres métodos usando radiación solar para la producción de Pre-Vitamina D3 en la piel.
    description: A partir de resultados de otros científicos y mediciones in situ del índice UV se calculo el TES al cual se debe exponer una persona a la radiación solar, realizando así una comparación de los tres métodos distintos, esto con el objetivo de obtener la mejor vía de automatizar el calculo.
    link: https://github.com/giovannilopez9808/Documents/raw/master/Articulos/Vitamin_D_2020.pdf
    github:
    img: vitamin_paper.png
  item8:
    title: Climatología del ultravioleta en una mega ciudad en transición
    description: En base a los datos medidos por la SEDEMA en el periodo 2000-2019 de irradiancia solar, datos de ozono medidos por el satelite OMI-NASA y datos de aerosoles proporcionados por AERONET se obtuvo la tendencia de la irradiancia UV en la Ciudad de México, esto con el fin de observar cambios en la contaminación del lugar y sus efectos sobre los humanos que viven en la región.
    link: https://github.com/giovannilopez9808/Documents/raw/master/Articulos/Analysisof_20_years_of_UV_Index_measurements_over_the_Mexico_City_Metropolitan_Area.pdf
    github: 
    img: trend_paper.png
  item7:
      title: Análisis basado en imágenes satelitales de Google Earth en el periodo 25/May/2006 al 10/Ago/2019
      description: A partir de la línea temporal de Google Earth se le realizo un procesamiento de imagenes para obtener los bordes de los objetos, para observar las zonas de cambios y peculiaridades.
      link: https://github.com/giovannilopez9808/Documents/raw/master/Informes/Edge_detection_2020.pdf
      github:
      img: animation.gif
  item6:
    title: Localización de incendios en el Delta del río Paraná
    description: Por medio de datos satelitales proporcionados por la plataforma FIRMS de la NASA y la NOA se obtiene la información sobre el número de incendios. Basados en estos datos se creó un código para procesar y contabilizar el número de incendios que afectaron a la región de Rosario y zonas aledañas, en el periodo del 3 de junio al 4 de agosto 2020.
    link: https://github.com/giovannilopez9808/Documents/raw/master/Informes/Focos%20de%20incendio%20en%20las%20islas%20del%20Paran%C3%A1%20%20frente%20a%20Rosario%20%20(Piacentini%2C%20Ipi%C3%B1a%2C%20Lopez-Padilla%2C%20Bolmaro)%20(Piacentini).pdf
    github:
    img: viirs-Fire.gif
  item5:
    title: Creación de fractales usando el conjunto de Julia
    description: Usando la definición del conjunto de Julia y se crearon una serie de fractales para analizar la evolución alrededor del origen.
    link: 
    github: https://github.com/giovannilopez9808/Julia_WorkShop_2021Q1/blob/main/soluci%C3%B3n_primer_proyecto_1/Primer_proyecto.ipynb
    img: fractal.gif
  item4:
    title: Estimación de los TES en la Ciudad de México 
    description: Por medio de la definición de la dosis UVA y eritemica y el uso de datos de irradiancia proporcionados por la SEDEMA se obtuvieron los tiempos de exposicion solar por minuto en el horario 8:00 hrs - 18:00 hrs.
    link: https://github.com/giovannilopez9808/Documents/raw/master/Posters/2020/CNF/TES/main.pdf
    github:
    img: tes_poster.png
  item3:
    title: Análisis a los parámetros atmosféricos en el Área Metropolitana de Monterrey
    description: Haciendo uso de las mediciones de PM10 realizadas por SIMA y una modificación propia del modelo SMARTS, se calcularon las diferencias relativas con el fin de observar las tendencias y sus efectos sobre los habitantes del Área Metropolitana de Monterrey.
    link: https://github.com/giovannilopez9808/Documents/raw/master/Posters/2020/CNF/PM10/main.pdf
    github:
    img: pm_poster.png
  item2:
    title: Estudio de la irradiancia solar con dos modelos de transferencia radiativa y su comparación con mediciones
    description: Haciendo el uso del modelo TUV y el modelo SMARTS, se analizaron las diferencias relativas de la irradianica solar. Se modificaron los códigos fuente de los dos modelos para automatizar el cálculo, esto con ayuda de una base de datos.
    link: https://github.com/giovannilopez9808/Documents/raw/master/Posters/2019/CNF/Transferencia%20radiativa/main.pdf
    github:
    img: transferencia_poster.png
  item1:
    title: Análisis de las irradiancioas UVA y eritémica medidas por el sistema de monitoreo atmosférico de la Ciudad de México
    description: Se realizó un estudio a las mediciones de irradiancia para el año 2016 haciendo uso del modelo TUV para obtener que tan factible es usar este modelo para realizar estimaciones de irradiancia solar haciendo uso de parámetros atmosféricos medidos por satelites.
    link: https://github.com/giovannilopez9808/Documents/raw/master/Posters/2019/AFA/Analisis%20indice%20UV/Analisis%20de%20irradiancia.pdf
